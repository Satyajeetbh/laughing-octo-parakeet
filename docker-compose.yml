services:
  frontend:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000

  backend:
    build: ./server
    ports:
      - "5000:5000"
    depends_on:
      - redis
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
      - OPENAI_TIMEOUT_MS=${OPENAI_TIMEOUT_MS:-25000}
      - AI_FEATURE_ENABLED=${AI_FEATURE_ENABLED:-true}
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - AI_DAILY_LIMIT_PER_USER=${AI_DAILY_LIMIT_PER_USER:-3}

  worker:
    build: ./server
    command: npm run worker
    depends_on:
      - redis
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
      - OPENAI_TIMEOUT_MS=${OPENAI_TIMEOUT_MS:-25000}
      - AI_FEATURE_ENABLED=${AI_FEATURE_ENABLED:-true}
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - AI_DAILY_LIMIT_PER_USER=${AI_DAILY_LIMIT_PER_USER:-3}

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"